    // --- security check: only show main if source=official or referrer from trusted domains ---
    async function checkSecurity() {
        const urlParams = new URLSearchParams(window.location.search);
        const source = urlParams.get('source');
        const referrer = document.referrer;
        
        // allow if source=official OR referrer contains earnlinks.io / lootdest.org / steps.html
        if (source === "official" || 
            referrer.includes("earnlinks.io") || 
            referrer.includes("lootdest.org") || 
            referrer.includes("steps.html")) {
            
            // clean URL (remove ?source=official) if present
            if (source === "official") {
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({}, document.title, cleanUrl);
            }
            document.getElementById('mainContainer').style.display = "block";
            generateLockedKey(); 
        } else {
            // show bypass detected
            document.getElementById('mainContainer').style.display = "none";
            document.getElementById('bypassContainer').style.display = "block";
            document.getElementById('finalKey').innerText = "ACCESS DENIED";
        }
    }

    // --- key generation: IP + date based seed (locked to device) ---
    async function generateLockedKey() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            const ip = data.ip;

            // daily seed (changes every day)
            const day = Math.floor(Date.now() / 86400000);
            const ipSeed = parseInt(ip.replace(/\./g, '').substring(0, 6)) || 123456; 
            
            // seed = IP + day + 2026 (matches app logic)
            let seed = ipSeed + day + 2026; 
            
            // pseudo-random generator (deterministic)
            function rnd() { 
                var x = Math.sin(seed++) * 10000; 
                return Math.abs(x - Math.floor(x)); 
            }
            
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let segments = [];
            for(let i=0; i<4; i++) {
                let s = "";
                for(let j=0; j<4; j++) {
                    let r = Math.floor(rnd() * chars.length);
                    s += chars.charAt(r);
                }
                segments.push(s);
            }

            const finalKey = "UKM-" + segments.join("-");
            document.getElementById('finalKey').innerText = finalKey;

        } catch (err) {
            document.getElementById('finalKey').innerText = "CONNECT TO INTERNET";
        }
    }

    // --- copy to clipboard ---
    function copyKey() {
        const keyText = document.getElementById('finalKey').innerText;
        if (keyText.includes("SECURE") || keyText.includes("CONNECT") || keyText.includes("DENIED")) return;

        navigator.clipboard.writeText(keyText).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = "COPIED SUCCESSFULLY! ✅";
            btn.style.background = "#00ff88";
            setTimeout(() => { 
                btn.innerText = "COPY TO CLIPBOARD"; 
                btn.style.background = "#ffffff";
            }, 2000);
        });
    }

    // --- on load run security ---
    window.onload = checkSecurity;
