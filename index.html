<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GET YOUR FREE KEY</title>

<style>
:root{
    --bg:#000;
    --card:#0f1a12;
    --text:#fff;
    --accent:#00ff88;
    --error:#ff4444;
}

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    text-align:center;
}

.key-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    overflow:hidden;
    margin:0 auto 10px;
    border:2px solid var(--accent);
}
.key-icon img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    font-size:22px;
    margin:10px 0 5px;
    color:var(--accent);
    text-shadow:0 0 10px rgba(0,255,136,0.5);
}

.subtitle{
    color:#aaa;
    margin-bottom:20px;
    font-size:13px;
}

.card{
    background:var(--card);
    padding:25px;
    border-radius:20px;
    border:1px solid rgba(0,255,136,0.2);
    box-shadow:0 0 25px rgba(0,255,136,0.1);
}

h2{
    color:var(--accent);
    margin-bottom:10px;
}

.card-p{
    font-size:13px;
    color:#aaa;
    margin-bottom:20px;
}

.key-box{
    background:#000;
    border:1px dashed var(--accent);
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
}

#finalKey{
    color:var(--accent);
    font-weight:bold;
    letter-spacing:1px;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.03);
}

.copy{
    background:var(--accent);
    color:#000;
}

.footer{
    margin-top:40px;
    font-size:11px;
    color:#666;
    letter-spacing:2px;
}
</style>
</head>

<body>

<div class="container">

<div id="mainContainer">

    <div class="key-icon">
        <img src="./assets/logo.png">
    </div>

    <h1>YOUR FREE KEY</h1>
    <div class="subtitle">ACCESS GRANTED</div>

    <div class="card">

        <h2>✓ Key Generated</h2>
        <p class="card-p">This key is locked to your device. Share it, and it won't work for others.</p>

        <div class="key-box">
            <span id="finalKey">SECURE FETCHING...</span>
        </div>

        <button class="btn copy" id="copyBtn" onclick="copyKey()">
            COPY TO CLIPBOARD
        </button>

    </div>
</div>

<div id="bypassContainer" style="display:none;">
    <div class="card">
        <h2 style="color:red;">Bypass Detected!</h2>
        <p class="card-p">Direct access not allowed.</p>
        <button class="btn" style="background:red;color:#fff;" onclick="location.href='steps.html'">
            RETURN
        </button>
    </div>
</div>

<div class="footer">
    ⚡ SABBIR  MODZ NINJA PLUS ⚡
</div>

</div>

<script>

async function checkSecurity() {
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('source');
    const referrer = document.referrer || "";

    const sessionData = JSON.parse(localStorage.getItem("authData") || "{}");
    const now = Date.now();

    if (sessionData.verified && sessionData.expiry > now) {
        document.getElementById('mainContainer').style.display = "block";
        generateLockedKey();
        return;
    }

    const allowed =
        source === "official" ||
        referrer.includes("earnlinks.io") ||
        referrer.includes("lootdest.org") ||
        referrer.includes("steps.html");

    if (allowed) {

        const expiryTime = now + (24 * 60 * 60 * 1000);

        localStorage.setItem("authData", JSON.stringify({
            verified: true,
            expiry: expiryTime
        }));

        document.getElementById('mainContainer').style.display = "block";
        generateLockedKey();

    } else {
        document.getElementById('mainContainer').style.display = "none";
        document.getElementById('bypassContainer').style.display = "block";
        document.getElementById('finalKey').innerText = "ACCESS DENIED";
    }
}

async function generateLockedKey(){
    try{
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        const ip = data.ip;

        const day = Math.floor(Date.now()/86400000);
        const ipSeed = parseInt(ip.replace(/\./g,'').substring(0,6));

        let seed = ipSeed + day + 2026;

        function rnd(){
            let x = Math.sin(seed++)*10000;
            return x - Math.floor(x);
        }

        const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let key=[];

        for(let i=0;i<4;i++){
            let s="";
            for(let j=0;j<4;j++){
                s += chars[Math.floor(rnd()*chars.length)];
            }
            key.push(s);
        }

        document.getElementById('finalKey').innerText="UKM-"+key.join("-");
    }catch(e){
        document.getElementById('finalKey').innerText="CONNECT TO INTERNET";
    }
}

function copyKey(){
    const key=document.getElementById('finalKey').innerText;
    if(key.includes("SECURE")||key.includes("CONNECT")) return;

    navigator.clipboard.writeText(key);
}

window.onload=checkSecurity;

</script>

</body>
</html>
